name: Release

# Tag a version (e.g. `git tag v0.1.0 && git push --tags`) to build the macOS .app/.dmg and attach it
# to the GitHub release. Both the zmax editor (crates/zmax submodule) and the stryke runtime
# (latest strykelang release) are bundled as Tauri externalBin sidecars by the prep scripts that run in
# tauri's beforeBuildCommand, so the shipped .app is self-contained.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Create the GitHub release (idempotent)
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes || true

  macos:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14   # Apple silicon → aarch64
            arch: aarch64
          - runner: macos-13   # Intel → x86_64
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          # PAT with read access to the private submodule repos (zmax-gui-core,
          # zpwr-embed-terminal, …); the default GITHUB_TOKEN can't clone them.
          token: ${{ secrets.SUBMODULES_PAT }}

      - name: Rust toolchain
        run: rustup update --no-self-update stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/zmax/target
            app/src-tauri/target
          key: ${{ matrix.arch }}-cargo-${{ hashFiles('crates/zmax/Cargo.lock', 'app/src-tauri/Cargo.lock') }}
          restore-keys: ${{ matrix.arch }}-cargo-

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Build the editor in release so the staged sidecar is a release binary (the prep script prefers
      # target/release and won't rebuild). Native target = the runner arch, matching the app bundle.
      - name: Build zmax editor (release)
        working-directory: crates/zmax
        run: cargo build --release --locked --bin zmax

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # tauri build runs beforeBuildCommand: copy-embed-terminal + prepare-stryke-sidecar (downloads
      # the strykelang release for this arch) + prepare-zmax-sidecar (stages the release editor).
      - name: Build the app bundle
        run: pnpm tauri build

      - name: Package + upload .dmg and .app
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          # Find the produced bundle under the tauri target dir (resilient to the app/src-tauri layout
          # and any target-triple subdir).
          DMG="$(find app/src-tauri/target -path '*/release/bundle/dmg/*.dmg' | head -1)"
          APP="$(find app/src-tauri/target -path '*/release/bundle/macos/*.app' -type d | head -1)"
          if [ -z "$DMG" ] || [ -z "$APP" ]; then
            echo "::error::bundle not found"; find app/src-tauri/target -path '*/bundle/*' -maxdepth 8 | head -50; exit 1
          fi
          OUT="$RUNNER_TEMP/zmax-gui-${TAG}-${{ matrix.arch }}"
          cp "$DMG" "${OUT}.dmg"
          ditto -c -k --keepParent "$APP" "${OUT}.app.zip"
          gh release upload "$TAG" "${OUT}.dmg" "${OUT}.app.zip" --clobber
